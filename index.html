<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junk Food Catcher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
  }
  .game-wrapper {
    position: relative;
  }
  canvas {
    border: 3px solid #e94560;
    border-radius: 12px;
    background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
    display: block;
    box-shadow: 0 0 40px rgba(233,69,96,0.3);
  }
  .ui-overlay {
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
  }
  .ui-item {
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 16px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .score { color: #4ecca3; }
  .level { color: #e94560; }
  .highscore { color: #f5c518; }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    border-radius: 12px;
    backdrop-filter: blur(5px);
    pointer-events: all;
  }
  .screen.hidden { display: none; }
  .screen h1 {
    font-size: 48px;
    color: #e94560;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(233,69,96,0.5);
  }
  .screen h2 {
    font-size: 36px;
    margin-bottom: 8px;
  }
  .screen p {
    color: #ccc;
    font-size: 18px;
    margin-bottom: 20px;
    text-align: center;
    max-width: 400px;
    line-height: 1.5;
  }
  .screen button {
    padding: 14px 40px;
    font-size: 20px;
    font-weight: bold;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: #e94560;
    color: #fff;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .screen button:hover {
    background: #ff6b81;
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(233,69,96,0.5);
  }
  .food-legend {
    display: flex;
    gap: 20px;
    margin-top: 15px;
    font-size: 14px;
    color: #aaa;
  }
  .food-legend span { display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
<div class="game-wrapper" id="wrapper">
  <canvas id="game"></canvas>
  <div class="screen" id="startScreen">
    <h1>🍕 JUNK FOOD CATCHER 🍔</h1>
    <p>Catch the falling junk food to score points!<br>Dodge the 💣 bombs — they take away points!<br><br>🎮 Move with <b>Mouse</b> or <b>Arrow Keys</b></p>
    <div class="food-legend">
      <span>🍕 +10 &nbsp;</span><span>🍔 +15 &nbsp;</span><span>🌭 +20 &nbsp;</span><span>🍟 +10 &nbsp;</span><span>🌮 +25</span>
    </div>
    <div class="food-legend">
      <span>🍩 +30 &nbsp;</span><span>🧁 +35 &nbsp;</span><span>🍪 +15 &nbsp;</span><span>💣 -50</span>
    </div>
    <br>
    <button onclick="startGame()">START GAME</button>
  </div>
  <div class="screen hidden" id="levelScreen">
    <h2 id="levelTitle"></h2>
    <p id="levelMsg"></p>
    <button onclick="resumeGame()">CONTINUE</button>
  </div>
  <div class="screen hidden" id="gameOverScreen">
    <h1>GAME OVER</h1>
    <p id="finalStats"></p>
    <button onclick="startGame()">PLAY AGAIN</button>
  </div>
  <div class="screen hidden" id="winScreen">
    <h1>🏆 YOU WIN! 🏆</h1>
    <p id="winStats"></p>
    <button onclick="startGame()">PLAY AGAIN</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 500, H = 700;
canvas.width = W;
canvas.height = H;

// --- State ---
let player, items, particles;
let score, level, lives, highScore;
let spawnTimer, frameCount, gameRunning, paused;
let keys = {};
let mouseX = -1;

// --- Level config: [speed, bombChance, scoreToNext, bombs] ---
const LEVELS = [
  { name: 'Level 1 — Snack Street',     speed: 2.0, bombChance: 0.12, scoreReq: 200, maxBombs: 4,  bg: ['#16213e','#0f3460'] },
  { name: 'Level 2 — Fast Food Alley',  speed: 2.6, bombChance: 0.18, scoreReq: 450, maxBombs: 7,  bg: ['#1a1a2e','#16213e'] },
  { name: 'Level 3 — Grease Lightning',  speed: 3.2, bombChance: 0.24, scoreReq: 750, maxBombs: 9,  bg: ['#2d1b3d','#1a1a2e'] },
  { name: 'Level 4 — Bomb Boulevard',    speed: 3.8, bombChance: 0.30, scoreReq: 1100, maxBombs: 12, bg: ['#3d1b1b','#2d1b3d'] },
  { name: 'Level 5 — Midnight Munchies', speed: 3.0, bombChance: 0.18, scoreReq: 1300, maxBombs: 8,  bg: ['#0d0d1a','#1a1a3e'] },
];

const FOODS = [
  { emoji: '🍕', name: 'pizza',     points: 10,  w: 44, h: 44, color: '#f4a460' },
  { emoji: '🍔', name: 'burger',    points: 15,  w: 44, h: 40, color: '#deb887' },
  { emoji: '🌭', name: 'hotdog',    points: 20,  w: 44, h: 30, color: '#cd5c5c' },
  { emoji: '🍟', name: 'fries',     points: 10,  w: 36, h: 44, color: '#daa520' },
  { emoji: '🌮', name: 'taco',      points: 25,  w: 44, h: 36, color: '#8b4513' },
  { emoji: '🍩', name: 'donut',     points: 30,  w: 40, h: 40, color: '#ff69b4' },
  { emoji: '🧁', name: 'cupcake',   points: 35,  w: 36, h: 40, color: '#ffb6c1' },
  { emoji: '🍪', name: 'cookie',    points: 15,  w: 38, h: 38, color: '#d2691e' },
  { emoji: '🧃', name: 'juice',     points: 20,  w: 30, h: 42, color: '#7fffd4' },
];

// --- Audio ---
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function beep(freq, dur, type='sine', vol=0.08) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function init() {
  player = { x: W/2 - 30, y: H - 100, w: 60, h: 60 };
  items = [];
  particles = [];
  score = 0;
  level = 0;
  lives = 3;
  highScore = parseInt(localStorage.getItem('jfcHighScore') || '0');
  spawnTimer = 0;
  frameCount = 0;
  keys = {};
  mouseX = -1;
  paused = false;
}

function getConfig() { return LEVELS[level]; }

function spawnItem() {
  const cfg = getConfig();
  const isBomb = Math.random() < cfg.bombChance && items.filter(i => i.bomb).length < cfg.maxBombs;
  if (isBomb) {
    items.push({
      emoji: '💣', bomb: true, points: -50,
      x: Math.random() * (W - 44), y: -50,
      w: 40, h: 44, speed: cfg.speed * (0.8 + Math.random() * 0.6),
      rot: 0, rotSpeed: (Math.random() - 0.5) * 0.1
    });
  } else {
    const food = FOODS[Math.floor(Math.random() * FOODS.length)];
    items.push({
      ...food,
      x: Math.random() * (W - food.w), y: -food.h - Math.random() * 60,
      speed: cfg.speed * (0.7 + Math.random() * 0.7),
      rot: 0, rotSpeed: (Math.random() - 0.5) * 0.08,
      bomb: false
    });
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 4;
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 1, decay: 0.02 + Math.random() * 0.03,
      color, size: 2 + Math.random() * 4
    });
  }
}

function update() {
  if (!gameRunning || paused) return;
  frameCount++;

  // Player movement
  const speed = 7;
  if (mouseX >= 0) {
    player.x += (mouseX - player.x - player.w/2) * 0.15;
  }
  if (keys['ArrowLeft'] || keys['a'])  player.x -= speed;
  if (keys['ArrowRight'] || keys['d']) player.x += speed;
  player.x = Math.max(0, Math.min(W - player.w, player.x));

  // Spawn
  const cfg = getConfig();
  const spawnDelay = Math.max(18, 50 - level * 8);
  spawnTimer++;
  if (spawnTimer >= spawnDelay) {
    spawnTimer = 0;
    spawnItem();
    if (level >= 2 && Math.random() < 0.35) spawnItem();
    if (level >= 4 && Math.random() < 0.4) spawnItem();
  }

  // Update items
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.y += it.speed;
    it.rot += it.rotSpeed;

    if (it.y > H + 60) {
      items.splice(i, 1);
      continue;
    }

    // Collision
    const px = player.x, py = player.y;
    const pw = player.w, ph = player.h;
    const ix = it.x, iy = it.y, iw = it.w, ih = it.h;
    if (px < ix + iw && px + pw > ix && py < iy + ih && py + ph > iy) {
      if (it.bomb) {
        score = Math.max(0, score + it.points);
        lives--;
        beep(120, 0.3, 'sawtooth', 0.12);
        spawnParticles(it.x + it.w/2, it.y + it.h/2, '#ff4444', 20);
        // Screen shake flash
        canvas.style.transform = 'translate(3px,0)';
        setTimeout(() => canvas.style.transform = '', 50);
      } else {
        score += it.points;
        beep(600 + it.points * 10, 0.1, 'sine', 0.06);
        spawnParticles(it.x + it.w/2, it.y + it.h/2, it.color, 8);
      }
      items.splice(i, 1);

      if (lives <= 0) {
        endGame();
        return;
      }

      // Check level up
      if (score >= cfg.scoreReq && level < 4) {
        levelUp();
        return;
      }
      if (score >= cfg.scoreReq && level === 4) {
        winGame();
        return;
      }
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update highscore
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('jfcHighScore', highScore);
  }
}

function draw() {
  const cfg = getConfig();
  // BG gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, cfg.bg[0]);
  grad.addColorStop(1, cfg.bg[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Grid lines for depth
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Items
  for (const it of items) {
    ctx.save();
    ctx.translate(it.x + it.w/2, it.y + it.h/2);
    ctx.rotate(it.rot);
    // Glow for bombs
    if (it.bomb) {
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 15 + Math.sin(frameCount * 0.1) * 8;
    } else {
      ctx.shadowColor = 'rgba(255,255,255,0.3)';
      ctx.shadowBlur = 8;
    }
    ctx.font = `${it.h}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(it.emoji, 0, 0);
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Player
  ctx.save();
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 20;
  // Basket
  const px = player.x, py = player.y;
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.moveTo(px, py + player.h);
  ctx.lineTo(px + 5, py);
  ctx.quadraticCurveTo(px + player.w/2, py - 8, px + player.w - 5, py);
  ctx.lineTo(px + player.w, py + player.h);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#ff6b81';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Rim highlight
  ctx.strokeStyle = '#ffb3c0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(px + 5, py);
  ctx.quadraticCurveTo(px + player.w/2, py - 8, px + player.w - 5, py);
  ctx.stroke();
  ctx.restore();

  // Lives
  ctx.font = '18px serif';
  ctx.textAlign = 'right';
  for (let i = 0; i < lives; i++) {
    ctx.fillText('❤️', W - 15 - i * 30, H - 20);
  }

  // Score & level on canvas
  ctx.font = 'bold 16px "Segoe UI", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#4ecca3';
  ctx.fillText(`Score: ${score}`, 15, 35);
  ctx.fillStyle = '#e94560';
  ctx.fillText(`Level: ${level + 1}/5`, 15, 58);
  ctx.fillStyle = '#f5c518';
  ctx.fillText(`Best: ${highScore}`, 15, 81);

  // Score bar
  const barW = W - 30;
  const barH = 6;
  const barX = 15, barY = 92;
  const progress = Math.min(1, score / cfg.scoreReq);
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(barX, barY, barW, barH);
  const barGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
  barGrad.addColorStop(0, '#e94560');
  barGrad.addColorStop(1, '#4ecca3');
  ctx.fillStyle = barGrad;
  ctx.fillRect(barX, barY, barW * progress, barH);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);

  // Next level target
  ctx.font = '10px "Segoe UI", sans-serif';
  ctx.fillStyle = '#888';
  ctx.textAlign = 'right';
  ctx.fillText(`Next: ${cfg.scoreReq}`, W - 15, barY - 4);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function levelUp() {
  level++;
  paused = true;
  beep(523, 0.1); setTimeout(() => beep(659, 0.1), 100); setTimeout(() => beep(784, 0.15), 200);

  document.getElementById('levelTitle').textContent = `🔥 ${LEVELS[level].name}`;
  document.getElementById('levelMsg').innerHTML =
    `<b>Speed:</b> ${(LEVELS[level].speed * 10).toFixed(0)}% faster<br>` +
    `<b>Bombs:</b> Up to ${LEVELS[level].maxBombs} at once!<br>` +
    `<b>Score to next:</b> ${LEVELS[level].scoreReq}`;
  document.getElementById('levelScreen').classList.remove('hidden');
}

function resumeGame() {
  document.getElementById('levelScreen').classList.add('hidden');
  paused = false;
  items = [];
}

function endGame() {
  gameRunning = false;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('jfcHighScore', highScore);
  }
  beep(200, 0.2, 'sawtooth'); setTimeout(() => beep(150, 0.3, 'sawtooth'), 200);
  document.getElementById('finalStats').innerHTML =
    `<b>Score:</b> ${score}<br><b>Level:</b> ${level + 1}/5<br><b>Best:</b> ${highScore}`;
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

function winGame() {
  gameRunning = false;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('jfcHighScore', highScore);
  }
  beep(523, 0.1); setTimeout(() => beep(659, 0.1), 100);
  setTimeout(() => beep(784, 0.1), 200); setTimeout(() => beep(1047, 0.2), 300);
  document.getElementById('winStats').innerHTML =
    `<b>Final Score:</b> ${score}<br><b>All 5 levels cleared!</b><br>🏆 Champion! 🏆`;
  document.getElementById('winScreen').classList.remove('hidden');
}

function startGame() {
  initAudio();
  init();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('levelScreen').classList.add('hidden');
  gameRunning = true;
  paused = false;
}

// --- Controls ---
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key] = false; e.preventDefault(); });
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
});
canvas.addEventListener('mouseleave', () => mouseX = -1);

// Touch
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - rect.left;
}, { passive: false });
canvas.addEventListener('touchend', () => mouseX = -1);

init();
loop();
</script>
</body>
</html>
